<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rule-Based AI Chatbox</title>
 
  <style>
    :root {
      --bg: #0b0f13;
      --card: #11161b;
      --header: #60666f;
      --header-name: #f3f4f6;
      --premium: #0f8f8f;
      --premium-text: #d9ffff;
      --phone-square: #20c66b;
      --chat-surface: #090d11;
      --bot-bubble: #11a7a5;
      --user-bubble: #2a2f36;
      --text: #e5e7eb;
      --muted: #b4bbc4;
      --input-bg: #151b22;
      --input-border: #2f3742;
      --send: #11a7a5;
      --send-dark: #0d8d8a;
      --shadow: 0 16px 36px rgba(0, 0, 0, 0.45);
      --bubble-shadow: 0 8px 18px rgba(0, 0, 0, 0.26);
      --header-btn-bg: rgba(255, 255, 255, 0.18);
      --header-btn-border: rgba(255, 255, 255, 0.35);
      --header-btn-text: #f8fafc;
    }
    [data-theme="light"] {
      --bg: #e8edf5;
      --card: #f8fafc;
      --header: #94a3b8;
      --header-name: #0f172a;
      --premium: #0ea5a4;
      --premium-text: #ecfeff;
      --phone-square: #22c55e;
      --chat-surface: #f1f5f9;
      --bot-bubble: #14b8a6;
      --user-bubble: #e2e8f0;
      --text: #0f172a;
      --muted: #475569;
      --input-bg: #ffffff;
      --input-border: #cbd5e1;
      --send: #0f8f8f;
      --send-dark: #0d7676;
      --shadow: 0 16px 30px rgba(15, 23, 42, 0.15);
      --bubble-shadow: 0 6px 14px rgba(15, 23, 42, 0.1);
      --header-btn-bg: rgba(255, 255, 255, 0.6);
      --header-btn-border: rgba(100, 116, 139, 0.3);
      --header-btn-text: #0f172a;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: "Inter", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }
    .chat-app {
      width: 100%;
      max-width: 430px;
      height: min(94vh, 880px);
      background: var(--card);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      border: 1px solid #1f2630;
    }
    .chat-header {
      padding: 12px 14px;
      background: var(--header);
      color: var(--header-name);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .chat-logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #22c55e, #14b8a6);
      display: grid;
      place-items: center;
      color: #ffffff;
      font-size: 16px;
      flex-shrink: 0;
    }
    .title-wrap h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .title-wrap p {
      display: none;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    .header-btn {
      border: 1px solid var(--header-btn-border);
      background: var(--header-btn-bg);
      color: var(--header-btn-text);
      border-radius: 10px;
      padding: 7px 9px;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s ease;
    }
    .header-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }
    .chat-box {
      padding: 16px;
      overflow-y: auto;
      background: var(--chat-surface);
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    .chat-box::-webkit-scrollbar {
      width: 10px;
    }
    .chat-box::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.5);
      border-radius: 10px;
    }
    .message-row {
      display: flex;
      width: 100%;
    }
    .message-row.bot {
      justify-content: flex-start;
      align-items: flex-end;
      gap: 8px;
    }
    .message-row.user {
      justify-content: flex-end;
    }
    .bot-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #2dd4bf;
      color: #042f2e;
      font-size: 0.75rem;
      font-weight: 700;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      margin-bottom: 18px;
    }
    .bubble-wrap {
      max-width: 84%;
    }
    .bubble {
      max-width: 80%;
      width: fit-content;
      padding: 10px 13px;
      border-radius: 16px;
      line-height: 1.4;
      font-size: 0.92rem;
      word-wrap: break-word;
      box-shadow: var(--bubble-shadow);
      animation: messageIn 0.18s ease-out;
    }
    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .meta {
      margin: 4px 2px 0;
      font-size: 0.73rem;
      color: var(--muted);
    }
    .bubble.bot {
      background: var(--bot-bubble);
      color: #ecfeff;
      border-top-left-radius: 7px;
    }
    .bubble.user {
      background: var(--user-bubble);
      color: var(--text);
      border-top-right-radius: 7px;
    }
    .chat-footer {
      border-top: 1px solid #1f2630;
      background: #10151b;
      padding: 12px 12px 10px;
    }
    .input-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }
    .chat-input-area {
      width: 100%;
      border: 1px solid var(--input-border);
      border-radius: 14px;
      padding: 10px 12px;
      min-height: 44px;
      font-size: 0.96rem;
      outline: none;
      resize: none;
      font-family: inherit;
      background: var(--input-bg);
      color: var(--text);
    }
    .chat-input-area:focus {
      border-color: #3c4552;
      box-shadow: 0 0 0 3px rgba(26, 188, 178, 0.15);
    }
    .send-btn {
      border: none;
      border-radius: 14px;
      background: var(--send);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0 18px;
      cursor: pointer;
      transition: background 0.15s ease-in-out;
    }
    .send-btn:hover {
      background: var(--send-dark);
    }
    .send-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .typing {
      display: none;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.84rem;
      margin-top: 8px;
      padding-left: 4px;
    }
    .typing.show {
      display: flex;
    }
    .typing-dots {
      display: flex;
      gap: 4px;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #94a3b8;
      animation: bounce 1s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) {
      animation-delay: 0.15s;
    }
    .typing-dots span:nth-child(3) {
      animation-delay: 0.3s;
    }
    @keyframes bounce {
      0%, 80%, 100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-4px);
      }
    }
    .hint {
      margin: 0;
      font-size: 0.74rem;
      color: var(--muted);
      padding: 10px 12px 12px;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.32), rgba(2, 6, 23, 0.55));
      border-top: 1px solid rgba(148, 163, 184, 0.18);
      letter-spacing: 0.2px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .hint-label {
      color: #d1d5db;
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.45px;
    }

    .hint-values {
      color: #cbd5e1;
      opacity: 0.95;
    }

    [data-theme="light"] .hint {
      background: linear-gradient(180deg, rgba(226, 232, 240, 0.9), rgba(241, 245, 249, 0.96));
      border-top: 1px solid rgba(148, 163, 184, 0.38);
    }

    [data-theme="light"] .hint-label {
      color: #334155;
    }

    [data-theme="light"] .hint-values {
      color: #475569;
    }
    @media (max-width: 640px) {
      body {
        padding: 0;
      }
      .chat-app {
        max-width: 100%;
        height: 100vh;
        border-radius: 0;
        border: none;
      }
      .title-wrap h1 {
        font-size: 0.95rem;
      }
      .chat-header {
        padding: 12px;
      }
      .header-right {
        gap: 6px;
      }
      .header-btn {
        padding: 6px 8px;
        font-size: 0.68rem;
      }
      .bubble-wrap {
        max-width: 94%;
      }
      .bubble {
        max-width: 92%;
      }
    }
  </style>
  
</head>
<body>
  <main class="chat-app">
    <header class="chat-header">
      <div class="chat-header-left">
        <div class="chat-logo">&#129302;</div>
        <div class="title-wrap">
          <h1>Rule-Based AI Chatbot</h1>
        </div>
      </div>
      <div class="header-right">
        <button id="themeBtn" class="header-btn" type="button">Light</button>
        <button id="clearBtn" class="header-btn" type="button">Clear</button>
      </div>
    </header>

    <section id="chatBox" class="chat-box" aria-live="polite"></section>

    <footer>
      <form id="chatForm" class="chat-footer">
        <div class="input-wrap">
          <textarea
            id="chatInput"
            class="chat-input-area"
            placeholder="Type a message..."
            rows="1"
            required
          ></textarea>
          <button id="sendBtn" class="send-btn" type="submit">Send</button>
        </div>
        <div id="typing" class="typing">
          <div class="typing-dots"><span></span><span></span><span></span></div>
          <span>Bot is typing...</span>
        </div>
      </form>
      <p class="hint">
        <span class="hint-label">Try</span>
        <span class="hint-values">hello, how are you, thanks, bye, help</span>
      </p>
    </footer>
  </main>

  <script>
    const chatBox = document.getElementById("chatBox");
    const chatForm = document.getElementById("chatForm");
    const chatInput = document.getElementById("chatInput");
    const typing = document.getElementById("typing");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const themeBtn = document.getElementById("themeBtn");

    // Clean input by lowercasing and removing extra spaces.
    function cleanInput(text) {
      return text.toLowerCase().trim().replace(/\s+/g, " ");
    }

    // Append a chat bubble to UI.
    function getCurrentTime() {
      return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    // Append a styled message to UI.
    function addMessage(sender, text) {
      const row = document.createElement("div");
      row.className = `message-row ${sender}`;

      const wrap = document.createElement("div");
      wrap.className = "bubble-wrap";

      const bubble = document.createElement("div");
      bubble.className = `bubble ${sender}`;
      bubble.textContent = text;

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = `${sender === "bot" ? "Bot" : "You"} • ${getCurrentTime()}`;

      if (sender === "bot") {
        const icon = document.createElement("div");
        icon.className = "bot-avatar";
        icon.textContent = "AI";
        row.appendChild(icon);
      }

      wrap.appendChild(bubble);
      wrap.appendChild(meta);
      row.appendChild(wrap);
      chatBox.appendChild(row);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Fetch response from Python backend.
    async function getBotResponseFromServer(userText) {
      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: userText })
        });

        if (!response.ok) {
          throw new Error("Server error");
        }

        const data = await response.json();
        return {
          response: data.response ?? "I don't understand.",
          ended: Boolean(data.ended)
        };
      } catch (error) {
        return {
          response: "Server is not reachable. Start Python backend with app.py.",
          ended: false
        };
      }
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      themeBtn.textContent = theme === "light" ? "Dark" : "Light";
      localStorage.setItem("chat-theme", theme);
    }

    function initTheme() {
      const savedTheme = localStorage.getItem("chat-theme");
      if (savedTheme === "light" || savedTheme === "dark") {
        applyTheme(savedTheme);
        return;
      }
      applyTheme("dark");
    }

    function resetChat() {
      chatBox.innerHTML = "";
      addMessage("bot", "Hi! I am your rule-based chatbot. Ask me anything simple.");
      addMessage("bot", "Type 'exit' any time to stop chatting.");
      chatInput.disabled = false;
      chatInput.placeholder = "Type a message...";
      sendBtn.disabled = false;
      chatInput.value = "";
      chatInput.focus();
    }

    async function respondWithTyping(reply) {
      typing.classList.add("show");
      await new Promise((resolve) => setTimeout(resolve, 550));
      typing.classList.remove("show");
      addMessage("bot", reply);
    }

    resetChat();

    // Input -> processing -> output flow.
    chatForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      const userRaw = chatInput.value;
      const userText = cleanInput(userRaw);

      if (!userText) {
        return;
      }

      addMessage("user", userRaw.trim());
      chatInput.value = "";

      const serverReply = await getBotResponseFromServer(userText);
      await respondWithTyping(serverReply.response);

      if (serverReply.ended) {
        chatInput.disabled = true;
        chatInput.placeholder = "Chat ended";
        sendBtn.disabled = true;
        return;
      }
      chatInput.focus();
    });

    // Submit on Enter, newline on Shift+Enter.
    chatInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        chatForm.requestSubmit();
      }
    });

    clearBtn.addEventListener("click", function () {
      resetChat();
    });

    themeBtn.addEventListener("click", function () {
      const activeTheme = document.documentElement.getAttribute("data-theme") || "dark";
      applyTheme(activeTheme === "dark" ? "light" : "dark");
    });

    initTheme();
  </script>
</body>
</html>
